<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/stylesheet.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav col-lg-4 justify-content-start">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
          </ul>

          <a class="navbar-brand col-lg-4 text-center d-none d-lg-block mx-0" href="#">
            <img src="assets/img/logo.svg" alt="Logo" height="30">
          </a>

          <ul class="navbar-nav col-lg-4 justify-content-end">
            <li class="nav-item">
              <button type="button" class="nav-link" data-bs-toggle="modal" data-bs-target=".about-modal">About</button>
            </li>
          </ul>
        </div>

        <a class="navbar-brand d-lg-none mx-auto" href="#">
          <img src="logo.png" alt="Titandemo Logo">
        </a>
      </div>
    </nav>
    <section class="container">
      <div class="col-md-4">
      </div>
      <div class="col-md-4">
      </div>
      <div class="col-md-4">
        <div id="news"></div>
      </div>
    </section>

    <div class="offcanvas offcanvas-bottom custom-height" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="bottomOffcanvas">
      <div class="offcanvas-body">
        <ul class="list-group list-group-flush">
          <li class="list-group-item">An item</li>
          <li class="list-group-item">A second item</li>
          <li class="list-group-item">A third item</li>
          <li class="list-group-item">A fourth item</li>
          <li class="list-group-item">And a fifth one</li>
        </ul>
      </div>
    </div>

    <div class="text-white bg-dark py-3 fixed-bottom fixed-bottom-shift">
      <div class="container">
        <div class="d-flex align-items-center">
          <div class="d-flex justify-content-start" style="flex: 1;">
            <div class="hstack">
              <button class="btn btn-link">
                <i class="bi bi-skip-backward-fill"></i>
              </button>
              <button class="btn btn-link">
                <i class="bi bi-play-fill"></i>
              </button>
              <button class="btn btn-link">
                <i class="bi bi-skip-forward-fill"></i>
              </button>
            </div>
          </div>
          <div class="text-center px-2" style="flex: 1;">
            Track title <span class="text-white-50">by</span> Alk
            <div class="progress mt-2" role="progressbar" style="height: 2px">
              <div class="progress-bar" style="width: 25%"></div>
            </div>
          </div>
          <div class="d-flex justify-content-end" style="flex: 1;">
            <div class="hstack gap-1">
              <button class="btn btn-link" type="button" data-bs-toggle="offcanvas" data-bs-target="#bottomOffcanvas">
                <i class="bi bi-music-note-list"></i>
                <i class="bi bi-caret-up-fill"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script src="assets/js/app.js"></script>

    <div class="modal fade about-modal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-black">
          <div class="modal-header border-0">
            <button type="button" class="btn text-white" data-bs-dismiss="modal" aria-label="Close"><i class="bi bi-x-lg"></i></button>
          </div>
          <div class="modal-body">
            <div class="marquee">
              <div class="sine-scroller"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
